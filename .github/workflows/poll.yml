name: Poll Telegram updates

on:
  schedule:
    - cron: '*/5 * * * *'   # каждые 5 минут
  workflow_dispatch:         # ручной запуск

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      # Клонируем репозиторий, используя PAT для доступа на запись
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      # Восстанавливаем last_update.txt из кэша
      - name: Restore last_update.txt from cache
        uses: actions/cache@v4
        with:
          path: last_update.txt
          key: last-update-${{ github.run_id }}
          restore-keys: |
            last-update-

      # Устанавливаем Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Устанавливаем зависимости
      - name: Install dependencies
        run: pip install requests

      # Запускаем скрипт бота
      - name: Run bot script
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}   # токен для работы с GitHub API
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python bot.py

      # Сохраняем обновлённый last_update.txt в кэш для следующих запусков
      - name: Save last_update.txt to cache
        uses: actions/cache/save@v4
        with:
          path: last_update.txt
          key: last-update-${{ github.run_id }}
