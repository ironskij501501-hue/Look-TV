
name: Poll Telegram updates

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore last_update cache
        uses: actions/cache@v3
        with:
          path: last_update.txt
          key: last-update-${{ github.run_id }}
          restore-keys: |
            last-update-
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run bot script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python bot.py
      - name: Save last_update cache
        uses: actions/cache@v3
        with:
          path: last_update.txt
          key: last-update-${{ github.run_id }}
